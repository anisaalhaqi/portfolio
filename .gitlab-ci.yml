image: node:20-alpine

# Cache node_modules to speed up builds
cache:
  paths:
    - .npm/

before_script:
  - npm ci --cache .npm --prefer-offline

pages:
  stage: deploy
  script:
    - npm run build
    - rm -rf public/*
    - cp -r out/* public/
  artifacts:
    paths:
      - public
  only:
    - main
    - master
